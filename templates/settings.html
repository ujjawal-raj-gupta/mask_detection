<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Settings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/galaxy.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/glass-theme.css') }}">
</head>
<body>
  <div id="galaxy-bg" class="galaxy-container" aria-hidden="true"></div>

  <div class="app-shell narrow">
    <header class="page-header">
      <div>
        <h1>Admin Settings</h1>
        <p>Adjust fever threshold and ESP32 serial port. Changes are saved to config.json.</p>
      </div>
      <nav class="nav-group">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link" href="/logs">Screening Logs</a>
        <a class="nav-link active" href="/settings">Settings</a>
      </nav>
    </header>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if message %}<div class="message">{{ message }}</div>{% endif %}

    <form class="panel" method="post">
      {% if not authenticated %}
      <label for="password">Admin Password</label>
      <input id="password" name="password" type="password" required>
      <div class="actions">
        <button type="submit">Unlock Settings</button>
      </div>
      {% else %}
      <label for="fever_threshold_c">Fever Threshold (&deg;C)</label>
      <input id="fever_threshold_c" name="fever_threshold_c" type="number"
        step="0.1" min="35" max="42"
        value="{{ config.fever_threshold_c }}">

      <label for="temp_port">Serial Port</label>
      <select id="temp_port" name="temp_port">
        {% for port in ports %}
        <option value="{{ port.device }}" {% if port.device == config.temp_port %}selected{% endif %}>
          {{ port.device }} — {{ port.description }}
        </option>
        {% endfor %}
        {% if ports|length == 0 %}
        <option value="{{ config.temp_port }}">{{ config.temp_port }}</option>
        {% endif %}
      </select>

      <label for="temp_baud">Serial Baud Rate</label>
      <input id="temp_baud" name="temp_baud" type="number"
        value="{{ config.temp_baud }}">

      <label for="new_password">New Admin Password (optional)</label>
      <input id="new_password" name="new_password" type="password">

      <div class="actions">
        <button type="submit">Save Settings</button>
        <a class="btn-primary" href="/settings/logout">Logout</a>
      </div>
      {% endif %}
    </form>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/galaxy.js') }}"></script>
</body>
</html>
