<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Settings</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e8edf4;
      --muted: #9aa8bc;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.75rem;
      margin-bottom: 8px;
    }

    header p, .message, .error {
      color: var(--muted);
      margin-bottom: 12px;
    }

    .error { color: #f87171; }
    .message { color: #86efac; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    label {
      display: block;
      margin: 16px 0 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #121a24;
      color: var(--text);
    }

    button, .link-btn {
      margin-top: 20px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Admin Settings</h1>
      <p>Adjust fever threshold and ESP32 serial port. Changes are saved to config.json.</p>
      <a class="link-btn" href="/">Back to Dashboard</a>
    </header>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if message %}<div class="message">{{ message }}</div>{% endif %}

    <form class="panel" method="post">
      {% if not authenticated %}
      <label for="password">Admin Password</label>
      <input id="password" name="password" type="password" required>
      <div class="actions">
        <button type="submit">Unlock Settings</button>
      </div>
      {% else %}
      <label for="fever_threshold_c">Fever Threshold (°C)</label>
      <input id="fever_threshold_c" name="fever_threshold_c" type="number"
        step="0.1" min="35" max="42"
        value="{{ config.fever_threshold_c }}">

      <label for="temp_port">Serial Port</label>
      <select id="temp_port" name="temp_port">
        {% for port in ports %}
        <option value="{{ port.device }}" {% if port.device == config.temp_port %}selected{% endif %}>
          {{ port.device }} — {{ port.description }}
        </option>
        {% endfor %}
        {% if ports|length == 0 %}
        <option value="{{ config.temp_port }}">{{ config.temp_port }}</option>
        {% endif %}
      </select>

      <label for="temp_baud">Serial Baud Rate</label>
      <input id="temp_baud" name="temp_baud" type="number"
        value="{{ config.temp_baud }}">

      <label for="new_password">New Admin Password (optional)</label>
      <input id="new_password" name="new_password" type="password">

      <div class="actions">
        <button type="submit">Save Settings</button>
        <a class="link-btn" href="/settings/logout">Logout</a>
      </div>
      {% endif %}
    </form>
  </div>
</body>
</html>
